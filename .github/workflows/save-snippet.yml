name: Save Snippet to Markdown

on:
  repository_dispatch:
    types: [save-snippet]

jobs:
  save:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write payload to file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = {
              text:      context.payload.client_payload.text,
              url:       context.payload.client_payload.url,
              title:     context.payload.client_payload.title,
              timestamp: context.payload.client_payload.timestamp,
            };
            fs.writeFileSync('/tmp/payload.json', JSON.stringify(payload));

      - name: Format with OpenRouter & Save
        env:
          OPENROUTER_KEY:   ${{ secrets.OPENROUTER_KEY }}
        run: |
          # ✅ Read ALL values from file — shell never sees raw user text
          TEXT=$(jq -r '.text'           /tmp/payload.json)
          URL=$(jq -r '.url'             /tmp/payload.json)
          TITLE=$(jq -r '.title'         /tmp/payload.json)
          TIMESTAMP=$(jq -r '.timestamp' /tmp/payload.json)

          # Build a safe filename from the date
          DATE=$(echo "$TIMESTAMP" | cut -c1-10)
          TIME=$(echo "$TIMESTAMP" | cut -c12-16)
          SAFE_TITLE=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-50)
          FILENAME="notes/${DATE}-${SAFE_TITLE}.md"
          mkdir -p notes

          # ✅ Write TEXT to a temp file — avoids ALL shell escaping issues
          printf '%s' "$TEXT" > /tmp/snippet_text.txt

          # ✅ Build JSON using jq reading from file — 100% safe
          # Try models in order until one works
          MODELS=(
            "google/gemma-3-27b-it:free"
            "meta-llama/llama-3.2-3b-instruct:free"
            "nousresearch/hermes-3-llama-3.1-405b:free"
            "qwen/qwen3-4b:free"
            "z-ai/glm-4.5-air:free"    
          )
          # 

          FORMATTED=""
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
          PAYLOAD=$(jq -Rs \
              --arg model "$MODEL" \
            --arg system "You are a Markdown formatter. Format the user text into clean well-structured Markdown. Rules: DO NOT change add or remove any words or content. Add proper headings bullet points bold or italic where it makes sense. Output ONLY the formatted Markdown no explanations." \
            '{ model: $model, messages: [ { role: "system", content: $system }, { role: "user", content: . } ] }' \
            /tmp/snippet_text.txt)

          # Call OpenRouter & save full response for debugging
          RESPONSE=$(curl -s \
            "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com" \
            -H "X-Title: GitHub Notes Saver" \
            -d "$PAYLOAD")

          # ✅ Debug: print full API response to Actions log
          echo "=== OpenRouter RAW RESPONSE ==="
          echo "$RESPONSE" | jq '.'
          echo "================================"

          # Extract formatted content
          FORMATTED=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
            if [ -n "$FORMATTED" ]; then
              echo "✅ Success with model: $MODEL"
              break
          fi
            echo "⚠️ Failed with $MODEL, trying next..."
          done

          # ✅ Fallback: if FORMATTED is empty, use raw text
          # Final fallback — use raw text if all models fail
          if [ -z "$FORMATTED" ]; then
            echo "⚠️ All models failed — using raw text as fallback"
            FORMATTED=$(cat /tmp/snippet_text.txt)
          fi

          # Write the markdown file
          {
            echo "---"
            printf 'title: "%s"\n' "$TITLE"
            printf 'source: "%s"\n' "$URL"
            printf 'saved_at: "%s"\n' "$TIMESTAMP"
            echo "---"
            echo ""
            printf '# %s\n' "$TITLE"
            echo ""
            printf '> *Saved on %s at %s UTC*\n' "$DATE" "$TIME"
            echo ""
            echo "---"
            echo ""
            printf '%s\n' "$FORMATTED"
            echo ""
            echo "---"
            echo ""
            printf '*Source: [%s](%s)*\n' "$URL" "$URL"
          } > "$FILENAME"

          echo "✅ Created: $FILENAME"

      - name: Commit and push
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add notes/
          git commit -m "📝 snippet: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

