name: Save Snippet to Markdown

permissions:
  contents: write

on:
  repository_dispatch:
    types: [save-snippet]

jobs:
  save:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write payload to file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = {
              text:      context.payload.client_payload.text,
              url:       context.payload.client_payload.url,
              title:     context.payload.client_payload.title,
              timestamp: context.payload.client_payload.timestamp,
            };
            fs.writeFileSync('/tmp/payload.json', JSON.stringify(payload));

      - name: Format with OpenRouter & Save
        env:
          OPENROUTER_KEY:   ${{ secrets.OPENROUTER_KEY }}
        run: |
          # âś… Read ALL values from file â€” shell never sees raw user text
          TEXT=$(jq -r '.text'           /tmp/payload.json)
          URL=$(jq -r '.url'             /tmp/payload.json)
          TITLE=$(jq -r '.title'         /tmp/payload.json)
          TIMESTAMP=$(jq -r '.timestamp' /tmp/payload.json)

          # Build a safe filename from the date
          DATE=$(echo "$TIMESTAMP" | cut -c1-10)
          TIME=$(echo "$TIMESTAMP" | cut -c12-16)
          SAFE_TITLE=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-50)
          FILENAME="notes/${DATE}-${SAFE_TITLE}.md"
          mkdir -p notes

          # âś… Write TEXT to a temp file â€” avoids ALL shell escaping issues
          printf '%s' "$TEXT" > /tmp/snippet_text.txt

          # âś… Load models and AI config from external files
          mapfile -t MODELS < <(grep -v '^\s*#' config/models.txt | grep -v '^\s*$')
          echo "đź“‹ Loaded ${#MODELS[@]} models from config/models.txt"

          SYSTEM_PROMPT=$(jq -r '.system_prompt' config/ai-config.json)
          TEMPERATURE=$(jq -r '.temperature'     config/ai-config.json)
          MAX_TOKENS=$(jq -r '.max_tokens'        config/ai-config.json)
          echo "âš™ď¸Ź  AI config loaded from config/ai-config.json"

          # Try models in order until one works
          FORMATTED=""
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
          PAYLOAD=$(jq -Rs \
              --arg   model       "$MODEL" \
              --arg   system      "$SYSTEM_PROMPT" \
              --argjson temperature "$TEMPERATURE" \
              --argjson max_tokens  "$MAX_TOKENS" \
            '{ model: $model, temperature: $temperature, max_tokens: $max_tokens, messages: [ { role: "system", content: $system }, { role: "user", content: . } ] }' \
            /tmp/snippet_text.txt)

          # Call OpenRouter & save full response for debugging
          RESPONSE=$(curl -s \
            "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com" \
            -H "X-Title: GitHub Notes Saver" \
            -d "$PAYLOAD")

          # âś… Debug: print full API response to Actions log
          echo "=== OpenRouter RAW RESPONSE ==="
          echo "$RESPONSE" | jq '.'
          echo "================================"

          # Extract formatted content
          FORMATTED=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
            if [ -n "$FORMATTED" ]; then
              echo "âś… Success with model: $MODEL"
              break
          fi
            echo "âš ď¸Ź Failed with $MODEL, trying next..."
          done

          # âś… Fallback: if FORMATTED is empty, use raw text
          # Final fallback â€” use raw text if all models fail
          if [ -z "$FORMATTED" ]; then
            echo "âš ď¸Ź All models failed â€” using raw text as fallback"
            FORMATTED=$(cat /tmp/snippet_text.txt)
          fi

          # Write the markdown file
          {
            echo "---"
            printf 'title: "%s"\n' "$TITLE"
            printf 'source: "%s"\n' "$URL"
            printf 'saved_at: "%s"\n' "$TIMESTAMP"
            echo "---"
            echo ""
            printf '# %s\n' "$TITLE"
            echo ""
            printf '> *Saved on %s at %s UTC*\n' "$DATE" "$TIME"
            echo ""
            echo "---"
            echo ""
            printf '%s\n' "$FORMATTED"
            echo ""
            echo "---"
            echo ""
            printf '*Source: [%s](%s)*\n' "$URL" "$URL"
          } > "$FILENAME"

          echo "âś… Created: $FILENAME"

      - name: Commit and push
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add notes/
          git commit -m "đź“ť snippet: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

