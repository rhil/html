<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>GitHub Notes Settings</title>
    <style>
      body { font-family: sans-serif; padding: 16px; width: 300px; }
      h2   { font-size: 16px; margin-bottom: 12px; }
      label { display: block; font-size: 12px; margin-bottom: 4px; color: #555; }
      input { width: 100%; padding: 6px; margin-bottom: 12px; box-sizing: border-box;
              border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
      button { width: 100%; padding: 8px; background: #2ea44f; color: white;
               border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
      button:hover { background: #22863a; }
      #status { margin-top: 10px; font-size: 12px; color: green; text-align: center; }
    </style>
  </head>
  <body>
    <h2>⚙️ GitHub Notes Settings</h2>
    <label>GitHub Personal Access Token</label>
    <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx" />
    <label>GitHub Owner (username or org)</label>
    <input type="text" id="githubOwner" placeholder="your-username" />
    <label>GitHub Repository</label>
    <input type="text" id="githubRepo" placeholder="your-repo-name" />
    <button id="save">Save Settings</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
